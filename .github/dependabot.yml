version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      vue-ecosystem:
        patterns:
          - "vue*"
          - "@vue/*"
          - "pinia*"
          - "vue-*"
      dev-tools:
        patterns:
          - "eslint*"
          - "prettier*"
          - "vitest*"
          - "typescript*"
          - "vue-tsc*"
      vite:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "@tailwindcss/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
